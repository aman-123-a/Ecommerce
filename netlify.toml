[build]
  command = "npm --prefix backend install && npm --prefix frontend install && CI=false npm --prefix frontend run build"
  publish = "frontend/build"

[functions]
  directory = "backend"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
